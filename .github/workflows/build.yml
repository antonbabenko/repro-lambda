name: build-lambdas (reusable)

on:
  workflow_call:
    inputs:
      manifest_path:
        type: string
        default: lambdas.toml
        description: Path to lambdas.toml in the caller repo.
      aws_dev_role_arn:
        type: string
        required: true
        description: ARN of the dev OIDC role assumed for artifact upload. Not a secret (the security boundary is the OIDC trust policy + bucket immutability), so callers pass it as a plain input.
      aws_prod_role_arn:
        type: string
        required: false
        default: ""
        description: ARN of the prod OIDC role (master push only). Empty string disables the prod upload steps.
      dev_bucket:
        type: string
        required: true
        description: S3 bucket name for dev Lambda artifacts (set as REPRO_LAMBDA_BUCKET on the dev upload). Caller-supplied so the reusable workflow stays consumer-agnostic.
      prod_bucket:
        type: string
        required: false
        default: ""
        description: S3 bucket name for prod Lambda artifacts (master push only).
      promotion_repo:
        type: string
        required: false
        default: ""
        description: >-
          owner/repo of the centralized promotion workflow. When set, the build Step
          Summary renders a ready-to-run `gh workflow run` command per function. Generic
          by design - the reusable workflow never hardcodes a promotion target; the caller
          supplies it (keep this empty for public callers).
      promotion_workflow:
        type: string
        required: false
        default: promote-lambda.yml
        description: Workflow file name dispatched by the promotion command in the Step Summary.
      project:
        type: string
        required: false
        default: ""
        description: >-
          Project key the promotion workflow expects (-f project=...). Defaults to the
          caller repo name when empty.
    secrets:
      sources_token:
        required: false
        description: >-
          Token with read access to the private release repos referenced by any
          github_release [[lambda.source]]. Exported as REPRO_LAMBDA_SOURCES_TOKEN for the
          build. Omit when every source is a public https URL. Generic by design - the
          reusable workflow never names a consumer repo.

jobs:
  detect-arches:
    runs-on: ubuntu-24.04
    outputs:
      arches: ${{ steps.parse.outputs.arches }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - id: parse
        shell: bash
        run: |
          uv run python - <<'PY'
          import json, os, sys
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open("${{ inputs.manifest_path }}", "rb") as f:
              data = tomllib.load(f)
          arches = sorted({l["arch"] for l in data.get("lambda", [])})
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"arches={json.dumps(arches)}\n")
          PY

  build:
    needs: detect-arches
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.detect-arches.outputs.arches) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0

      # Content-addressed source cache, scoped per-arch (a source's sha256 is its key, so a
      # re-pin changes the manifest hash -> fresh fetch; restore-keys reuses the prior cache).
      - name: Cache fetched sources
        uses: actions/cache@v4
        with:
          path: builds/.sources-cache
          key: repro-sources-${{ matrix.arch }}-${{ hashFiles(inputs.manifest_path) }}
          restore-keys: |
            repro-sources-${{ matrix.arch }}-

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.aws_dev_role_arn }}
          aws-region: eu-west-1

      - name: Build (dev bucket)
        env:
          REPRO_LAMBDA_BUCKET: ${{ inputs.dev_bucket }}
          REPRO_LAMBDA_SOURCES_TOKEN: ${{ secrets.sources_token }}
        run: uvx --from repro-lambda repro-lambda build --manifest "${{ inputs.manifest_path }}" --arch "${{ matrix.arch }}" --json-out "$RUNNER_TEMP/build-summary.json"

      # Render the dev build's content shas + a copy-paste promotion command per function
      # into the run's Step Summary (the build JSON is otherwise buried in step logs).
      # NB: the JSON lives in RUNNER_TEMP (outside the workspace), so hashFiles() can't guard
      # it - run on success() and skip inside the script if the file is somehow absent.
      - name: Build summary (content shas + promote commands)
        if: success()
        env:
          SUMMARY_JSON: ${{ runner.temp }}/build-summary.json
          PROMOTION_REPO: ${{ inputs.promotion_repo }}
          PROMOTION_WORKFLOW: ${{ inputs.promotion_workflow }}
          PROJECT: ${{ inputs.project != '' && inputs.project || github.event.repository.name }}
          ARCH: ${{ matrix.arch }}
          SRC_REPO: ${{ github.repository }}
          SRC_COMMIT: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json, os, sys

          path = os.environ["SUMMARY_JSON"]
          if not os.path.exists(path):
              print(f"::notice::no build summary JSON at {path}; skipping summary.")
              sys.exit(0)
          rows = json.load(open(path))
          repo = os.environ["PROMOTION_REPO"]
          wf = os.environ["PROMOTION_WORKFLOW"]
          project = os.environ["PROJECT"]
          arch = os.environ["ARCH"]
          src = os.environ["SRC_REPO"]
          commit = os.environ["SRC_COMMIT"]

          out = [
              f"## Lambda build ({arch})",
              "",
              f"Source: `{src}` @ `{commit[:12]}`",
              "",
              "| Function | Outcome | Content SHA | Dev key |",
              "| --- | --- | --- | --- |",
          ]
          for r in rows:
              out.append(
                  f"| `{r['logical_name']}` | {r['outcome']} | `{r['sha256']}` | `{r['bucket_key']}` |"
              )
          out += ["", "### Promote to prod", ""]
          for r in rows:
              fn, sha = r["logical_name"], r["sha256"]
              out += [f"**`{fn}`** prod pin: `{fn} = \"{sha}\"`", ""]
              if repo:
                  out += [
                      "```bash",
                      f"gh workflow run {wf} --repo {repo} "
                      f"-f project={project} -f function={fn} -f sha={sha}",
                      "```",
                      "",
                  ]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(out) + "\n")
          PY

      - name: Verify reproducible (PR only)
        if: github.event_name == 'pull_request'
        run: uvx --from repro-lambda repro-lambda build --manifest "${{ inputs.manifest_path }}" --arch "${{ matrix.arch }}" --verify --dry-run

      - name: Configure AWS credentials (prod)
        if: github.ref == 'refs/heads/master' && inputs.aws_prod_role_arn != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.aws_prod_role_arn }}
          aws-region: eu-west-1

      - name: Build (prod bucket)
        if: github.ref == 'refs/heads/master' && inputs.aws_prod_role_arn != ''
        env:
          REPRO_LAMBDA_BUCKET: ${{ inputs.prod_bucket }}
          REPRO_LAMBDA_SOURCES_TOKEN: ${{ secrets.sources_token }}
        run: uvx --from repro-lambda repro-lambda build --manifest "${{ inputs.manifest_path }}" --arch "${{ matrix.arch }}"

      - name: Commit catalog drift (master only, dev bot)
        if: github.ref == 'refs/heads/master'
        run: |
          if [[ -n "$(git status --porcelain builds/catalog.json)" ]]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add builds/catalog.json
            git commit -m "chore(catalog): auto-update after build [skip ci]"
            git push
          fi
